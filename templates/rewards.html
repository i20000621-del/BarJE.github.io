{% extends 'base_admin.html' %}{% block body %}<h2>兌換設定</h2><form class="card" method="post" action="/rewards/add"><h3>新增兌換項目</h3><div class="form-row"><input name="name" placeholder="兌換名稱，例如折抵 50 元" required><input name="points_cost" type="number" placeholder="需點數" required><input name="discount_amount" type="number" placeholder="折抵金額，可 0" value="0"><input name="description" placeholder="說明"><button class="btn green">新增</button></div></form><div class="card"><table><tr><th>ID</th><th>名稱</th><th>需點數</th><th>折抵</th><th>說明</th><th>狀態</th><th>操作</th></tr>{% for r in rewards %}<tr><td>{{r.id}}</td><td>{{r.name}}</td><td>{{r.points_cost}}</td><td>{{r.discount_amount}}</td><td>{{r.description}}</td><td>{{'啟用' if r.enabled else '停用'}}</td><td><form class="inline" method="post" action="/rewards/{{r.id}}/toggle"><button class="btn gray">切換</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
