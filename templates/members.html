{% extends 'base_checkout.html' %}{% block body %}<h2>會員集點</h2><form class="card" method="post" action="/members/add"><h3>新增會員 / LINE 模擬綁定</h3><div class="form-row"><input name="display_name" placeholder="會員名稱" required><input name="phone" placeholder="電話"><input name="line_user_id" placeholder="LINE userId，正式版由 LIFF 帶入"><button class="btn green">新增會員</button></div><p class="muted">目前 V1.5 為本機測試版，可手動建立會員；正式上雲端後再接 LINE 官方帳號 LIFF。</p></form><form class="card" method="get" action="/members"><input name="q" value="{{q}}" placeholder="搜尋名稱 / 電話 / LINE userId"><button class="btn">搜尋</button></form><div class="card"><table><tr><th>ID</th><th>名稱</th><th>電話</th><th>LINE userId</th><th>點數</th><th>操作</th></tr>{% for m in members %}<tr><td>{{m.id}}</td><td>{{m.display_name}}</td><td>{{m.phone}}</td><td>{{m.line_user_id}}</td><td><b>{{m.total_points}}</b></td><td><a class="btn" href="/members/{{m.id}}">明細</a> <a class="btn gray" href="/member-center/{{m.id}}">會員頁</a></td></tr>{% endfor %}</table></div>{% endblock %}
