{% extends "base_client.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:60px auto;">
  <h2>系統登入</h2>
  {% if error %}<p style="color:#b00020;font-weight:bold;">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{ next }}">
    <label>登入端別</label>
    <select name="role" style="width:100%;padding:10px;margin:8px 0 14px;">
      {% for key,label in roles.items() %}<option value="{{ key }}">{{ label }}</option>{% endfor %}
    </select>
    <label>密碼</label>
    <input type="password" name="password" style="width:100%;padding:10px;margin:8px 0 14px;" required>
    <button class="btn" type="submit">登入</button>
  </form>
  <p class="muted">預設：admin123 / kitchen123 / checkout123。正式上線前請修改 config.json 或雲端環境變數。</p>
</div>
{% endblock %}
